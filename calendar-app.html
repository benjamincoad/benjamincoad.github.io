<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Calendar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .input-section {
            margin-bottom: 20px;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 8px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input, button {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-top: 20px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: bold;
            padding: 10px;
            background-color: #f0f0f0;
        }

        .day {
            min-height: 100px;
            padding: 5px;
            border: 1px solid #ddd;
            background-color: white;
        }

        .day.different-month {
            background-color: #f9f9f9;
            color: #999;
        }

        .event {
            margin: 2px 0;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 12px;
            background-color: #e3f2fd;
            border-left: 3px solid #2196f3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-list {
            margin-top: 20px;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 8px;
        }

        .event-list h3 {
            margin-bottom: 10px;
        }

        .event-item {
            background-color: white;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            border-left: 3px solid #2196f3;
        }
    </style>
</head>
<body>
    <div class="input-section">
        <h2>Add Event</h2>
        <div class="input-group">
            <input type="text" id="eventTitle" placeholder="Event Title">
            <input type="date" id="startDate">
            <input type="date" id="endDate">
            <button onclick="addEvent()">Add Event</button>
        </div>
    </div>

    <div class="calendar-header">
        <button onclick="previousMonth()">&lt; Previous</button>
        <h2 id="currentMonth">Month Year</h2>
        <button onclick="nextMonth()">Next &gt;</button>
    </div>

    <div class="calendar" id="calendar">
        <!-- Calendar will be populated by JavaScript -->
    </div>

    <div class="event-list">
        <h3>All Events</h3>
        <div id="eventList">
            <!-- Events will be listed here -->
        </div>
    </div>

    <script>
        const DateTime = luxon.DateTime;
        let currentDate = DateTime.local();
        let events = [];

        function addEvent() {
            const title = document.getElementById('eventTitle').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;

            if (!title || !start || !end) {
                alert('Please fill in all fields');
                return;
            }

            const event = {
                title,
                start: DateTime.fromISO(start),
                end: DateTime.fromISO(end)
            };

            events.push(event);
            renderCalendar();
            renderEventList();
            
            // Clear inputs
            document.getElementById('eventTitle').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
        }

        function renderEventList() {
            const container = document.getElementById('eventList');
            container.innerHTML = '';

            events.sort((a, b) => a.start - b.start).forEach(event => {
                const div = document.createElement('div');
                div.className = 'event-item';
                div.textContent = `${event.title}: ${event.start.toLocaleString()} - ${event.end.toLocaleString()}`;
                container.appendChild(div);
            });
        }

        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            const monthHeader = document.getElementById('currentMonth');
            
            // Update month header
            monthHeader.textContent = currentDate.toFormat('MMMM yyyy');

            // Clear existing calendar
            calendar.innerHTML = '';

            // Add weekday headers
            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            weekdays.forEach(day => {
                const div = document.createElement('div');
                div.className = 'weekday';
                div.textContent = day;
                calendar.appendChild(div);
            });

            // Get start of month
            let startDate = currentDate.startOf('month').startOf('week');
            
            // Create 6 weeks of days
            for (let i = 0; i < 42; i++) {
                const dayDate = startDate.plus({ days: i });
                const div = document.createElement('div');
                div.className = 'day';
                if (dayDate.month !== currentDate.month) {
                    div.className += ' different-month';
                }

                // Add date number
                const dateNumber = document.createElement('div');
                dateNumber.textContent = dayDate.day;
                div.appendChild(dateNumber);

                // Add events for this day
                const dayEvents = events.filter(event => 
                    dayDate >= event.start.startOf('day') && 
                    dayDate <= event.end.startOf('day')
                );

                dayEvents.forEach(event => {
                    const eventDiv = document.createElement('div');
                    eventDiv.className = 'event';
                    eventDiv.textContent = event.title;
                    div.appendChild(eventDiv);
                });

                calendar.appendChild(div);
            }
        }

        function previousMonth() {
            currentDate = currentDate.minus({ months: 1 });
            renderCalendar();
        }

        function nextMonth() {
            currentDate = currentDate.plus({ months: 1 });
            renderCalendar();
        }

        // Initialize calendar
        renderCalendar();
    </script>
</body>
</html>
